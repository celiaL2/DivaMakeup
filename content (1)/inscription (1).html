<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beauty Shop - Inscription</title>
  <link rel="stylesheet" href="../style/inscription.css">
  <script src="../javascript/inscription.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  

<header class="auth-header">

  <div class="logo">
    DivaMakeup<span>.</span>
  </div>

  <!-- BURGER -->
  <div id="menu-btn">
    <i class="fa-solid fa-bars"></i>
  </div>

  <!-- NAV -->
  <ul class="nav-links" id="nav-links">
    <li><a href="../index.html">Accueil</a></li>
    <li><a href="produits.html">Produits</a></li>
    <li><a href="commande.html">Connexion</a></li>
    <li><a href="connexion.html">Commande</a></li>
  </ul>

  <a href="commande.html" class="btn-auth">
    Commander
  </a>

</header>
<div class="register-container">

  <div class="register-card">

    <div class="logo">DivaMakeup</div>
    <p class="subtitle">Créer un nouveau compte</p>

    <form onsubmit="inscription(event)">

      <input type="text" id="nom" placeholder="Nom" required>
<input type="text" id="prenom" placeholder="Prénom" required>
<input type="email" id="email" placeholder="Email" required>
<input type="tel" id="tel" placeholder="Téléphone" required>

<input type="password" id="pass" placeholder="Mot de passe" required>
<input type="password" id="confirm" placeholder="Confirmer mot de passe" required>

      <button type="submit">Créer mon compte</button>

      <p class="login-link">
        Vous avez déjà un compte ?
        <a href="connexion.html">Se connecter</a>
      </p>

    </form>

  </div>

</div>

</body>
</html>
